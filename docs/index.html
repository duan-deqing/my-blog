<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>我的笔记文档</title>
    <!-- Docsify CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/docsify/lib/themes/vue.css"
    />
    <!-- 添加标签图标 -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="favicon.png" />
  </head>
  <body>
    <div id="app"></div>
    <!-- Docsify JS -->

    <!-- 配置必须写在 JS 前面！！！ -->
    <script>
      window.$docsify = {
        name: "STYLAN's Docs",
        repo: "https://github.com/duan-deqing/my-blog",
        loadSidebar: true, // 开启侧边栏
        loadNavbar: true, // 开启顶部导航
        subMaxLevel: 2, // 侧边栏展开层级
        search: {
          placeholder: "搜索文档...",
          depth: 3, // 增加搜索深度，确保能搜到笔记
        },
        // 关键：解决本地加载路径问题
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
        },
      };
    </script>

    <!-- JS放到最后 -->
    <script src="https://unpkg.com/docsify/lib/docsify.min.js"></script>
    <!-- 搜索插件 -->
    <script src="https://unpkg.com/docsify/lib/plugins/search.min.js"></script>
  </body>
</html>
