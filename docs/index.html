<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>STYLAN's Notes</title>
    <!-- Docsify CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/docsify/lib/themes/vue.css"
    />
    <!-- 添加标签图标 -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <style>
      /* 手机端全局优化 */
      @media (max-width: 768px) {
        /* 内容宽度占满屏幕，不留边 */
        .content {
          padding: 15px 8px !important;
          font-size: 16px !important;
          line-height: 1.7 !important;
        }
        /* 标题不要太大 */
        h1 {
          font-size: 24px !important;
        }
        h2 {
          font-size: 20px !important;
        }
        h3 {
          font-size: 18px !important;
        }

        /* 图片自动缩放，不超出屏幕 */
        img {
          max-width: 100% !important;
          height: auto !important;
        }

        /* 代码块不横向滚动，自动换行 */
        pre,
        code {
          white-space: pre-wrap !important;
          word-wrap: break-word !important;
          overflow-x: hidden !important;
          font-size: 14px !important;
        }

        /* 表格手机端可横向滑动 */
        table {
          display: block !important;
          overflow-x: auto !important;
        }
      }

      .sidebar-toggle::before {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- Docsify JS -->

    <!-- 配置必须写在 JS 前面！！！ -->
    <script>
      window.$docsify = {
        name: "STYLAN's Notes",
        repo: "https://github.com/duan-deqing/my-blog",
        loadSidebar: true, // 开启侧边栏
        loadNavbar: true, // 开启顶部导航
        subMaxLevel: 2, // 侧边栏展开层级

        // 手机端自动隐藏侧边栏
        hideSidebar: false,
        // 小屏幕自动折叠
        autoHeader: true,
        // 只在桌面显示侧边栏
        onlyCover: false,
        // 手机端标题换行优化
        // 手机端标题换行优化
        title: "STYLAN's Notes",

        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
        },
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "搜索",
          depth: 2, // 增加搜索深度，确保能搜到笔记
        },
        // 关键：解决本地加载路径问题
      };
    </script>

    <!-- JS放到最后 -->
    <script src="https://unpkg.com/docsify/lib/docsify.min.js"></script>
    <!-- 搜索插件 -->
    <script src="https://unpkg.com/docsify/lib/plugins/search.min.js"></script>
  </body>
</html>
